name: Import and verify full Atlas app

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-full-app:
    name: Import, build, and publish full native app
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Reconstruct hash-verified full source
        run: |
          set -euo pipefail
          ls atlas-import-part-* >/dev/null
          cat atlas-import-part-* > /tmp/atlas-native-source.b64
          echo '75bd061daa5a16676a1423e5fc3bab47be7c88bdaf7b8d677dc4be6012f46316  /tmp/atlas-native-source.b64' | shasum -a 256 -c -
          python3 - <<'PY'
          import base64
          from pathlib import Path
          Path('/tmp/atlas-native-source.tar.gz').write_bytes(base64.b64decode(Path('/tmp/atlas-native-source.b64').read_bytes()))
          PY
          echo 'e24e88bfad848f82756d5de298d0ea91a3a9d72f6fde9b08ec200f340912dd6d  /tmp/atlas-native-source.tar.gz' | shasum -a 256 -c -
          mkdir -p /tmp/atlas-native-source
          tar -xzf /tmp/atlas-native-source.tar.gz -C /tmp/atlas-native-source
          rsync -a --delete --exclude='.git/' /tmp/atlas-native-source/ ./
          chmod +x scripts/*.sh

      - name: Apply native compile fixes and native-only branding
        run: |
          set -euo pipefail
          cat > apps/ios/AtlasApp/ProductionMinimuxerBridge.swift <<'SWIFT'
          import Foundation
          import AtlasCore

          #if canImport(minimuxer)
          private import minimuxer

          actor ProductionMinimuxerBridge: LocalDeviceMuxer {
              func runtimeStatus() -> NativeRuntimeStatus {
                  NativeRuntimeStatus(isReady: true, message: "minimuxer runtime linked")
              }

              private var pairingFile: URL?
              private var started = false

              func configure(pairingRecord: PairingRecord) async throws {
                  let url = FileManager.default.temporaryDirectory
                      .appendingPathComponent("atlas-pairing-\(pairingRecord.deviceUDID).plist")
                  try pairingRecord.data.write(to: url, options: [.atomic, .completeFileProtection])
                  pairingFile = url
              }

              func start() async throws {
                  guard let pairingFile else {
                      throw LocalDeviceTransportError.pairingRecordMissing("unknown")
                  }
                  let log = FileManager.default.temporaryDirectory.appendingPathComponent("atlas-minimuxer.log")
                  try startWithLogger(pairingFile.path, log.path, true)
                  target_minimuxer_address()
                  guard ready() else { throw LocalDeviceTransportError.tunnelDidNotConnect }
                  started = true
              }

              func stop() async {
                  started = false
                  if let pairingFile { try? FileManager.default.removeItem(at: pairingFile) }
                  pairingFile = nil
              }

              func install(ipa: URL, udid: String) async throws {
                  guard started else { throw LocalDeviceTransportError.tunnelDidNotConnect }
                  let data = try Data(contentsOf: ipa, options: .mappedIfSafe)
                  let bundleID = try IPAIdentity.bundleIdentifier(from: ipa)
                  try data.withUnsafeBytes { rawBuffer in
                      let bytes = rawBuffer.bindMemory(to: UInt8.self)
                      try yeet_app_afc(bundleID, bytes)
                  }
                  try install_ipa(bundleID)
              }

              func activate(bundleIdentifier: String, udid: String) async throws {
                  // installation_proxy activates the installed app.
              }

              func deactivate(bundleIdentifier: String, udid: String) async throws {
                  try remove_app(bundleIdentifier)
              }

              func enableJIT(bundleIdentifier: String, udid: String) async throws {
                  try debug_app(bundleIdentifier)
              }
          }
          #else
          actor ProductionMinimuxerBridge: LocalDeviceMuxer {
              enum Error: LocalizedError {
                  case missingFramework
                  var errorDescription: String? {
                      "minimuxer.xcframework is missing. Run scripts/bootstrap-native.sh on macOS before generating the Xcode project."
                  }
              }
              func runtimeStatus() -> NativeRuntimeStatus { NativeRuntimeStatus(isReady: false, message: Error.missingFramework.localizedDescription) }
              func configure(pairingRecord: PairingRecord) async throws { throw Error.missingFramework }
              func start() async throws { throw Error.missingFramework }
              func stop() async {}
              func install(ipa: URL, udid: String) async throws { throw Error.missingFramework }
              func activate(bundleIdentifier: String, udid: String) async throws { throw Error.missingFramework }
              func deactivate(bundleIdentifier: String, udid: String) async throws { throw Error.missingFramework }
              func enableJIT(bundleIdentifier: String, udid: String) async throws { throw Error.missingFramework }
          }
          #endif

          private enum IPAIdentity {
              enum ParseError: LocalizedError {
                  case unsupported
                  var errorDescription: String? { "Unable to read the IPA bundle identifier." }
              }
              static func bundleIdentifier(from ipa: URL) throws -> String {
                  let sidecar = ipa.deletingPathExtension().appendingPathExtension("bundleid")
                  if let value = try? String(contentsOf: sidecar, encoding: .utf8)
                      .trimmingCharacters(in: .whitespacesAndNewlines), !value.isEmpty {
                      return value
                  }
                  throw ParseError.unsupported
              }
          }
          SWIFT

          python3 - <<'PY'
          from pathlib import Path
          path = Path('apps/ios/AtlasApp/Views.swift')
          text = path.read_text()
          text = text.replace('LabeledContent("IPA","Choose app")', 'LabeledContent("IPA", value: "Choose app")')
          text = text.replace('LabeledContent("Certificate","Choose P12")', 'LabeledContent("Certificate", value: "Choose P12")')
          text = text.replace('LabeledContent("Profile","Choose profile")', 'LabeledContent("Profile", value: "Choose profile")')
          path.write_text(text)
          PY

          cat > README.md <<'README'
          # Atlas for iOS

          Atlas is a native iPhone sideloading and app-management application for iOS 26. It is built as an unsigned arm64 IPA on GitHub's macOS 26 runners.

          Atlas is not a web app, dashboard, API server, or browser-based sideloader.

          ## Native architecture

          Atlas uses the on-device transport expected by SideStore-style workflows:

          `LocalDevVPN → minimuxer → lockdown / MobileInstallation`

          The iOS app contains the user interface, pairing-record handling, device transport coordination, IPA installation and refresh paths, JIT requests, AltSource support, provisioning diagnostics, secure persistence, and job orchestration.

          ## Repository layout

          - `apps/ios/AtlasApp` — native SwiftUI iPhone application.
          - `packages/AtlasCore` — portable Swift domain models, persistence, diagnostics, and tests.
          - `docs` — native architecture, LocalDevVPN integration, verification, and device-test documentation.
          - `scripts` — minimuxer bootstrap and release validation.
          - `.github/workflows` — macOS 26 / Xcode 26 unsigned device-IPA build.

          ## Build an unsigned iOS 26 IPA

          GitHub Actions builds for a real arm64 iPhone target with code signing disabled. The artifact contains `Payload/Atlas.app` and a SHA-256 checksum.

          Local macOS build:

          ```bash
          brew install xcodegen
          ./scripts/bootstrap-native.sh
          xcodebuild \
            -project apps/ios/Atlas.xcodeproj \
            -scheme AtlasApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            ARCHS=arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
          ```

          ## Device requirements

          - iPhone running iOS 26.
          - LocalDevVPN installed and active.
          - A pairing record for the device.
          - The minimuxer XCFramework installed by `scripts/bootstrap-native.sh`.
          - A signing method for installing the unsigned build.

          ## Verification

          ```bash
          swift test --package-path packages/AtlasCore
          ```

          GitHub CI additionally compiles the full physical-device target, verifies arm64 output, removes code-signing material, validates the IPA archive, and publishes its checksum.
          README

          grep -RniE 'web companion|companion web|web dashboard|API server|browser-based sideloader' README.md docs apps/ios packages || true

      - name: Select Xcode 26
        run: |
          set -euo pipefail
          XCODE_PATH="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V | tail -1)"
          test -n "$XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install XcodeGen and minimuxer
        run: |
          set -euo pipefail
          brew install xcodegen
          cat > scripts/bootstrap-native.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          ROOT="$(cd "$(dirname "$0")/.." && pwd)"
          OUT="$ROOT/apps/ios/Frameworks"
          TMP="$(mktemp -d)"
          trap 'rm -rf "$TMP"' EXIT
          mkdir -p "$OUT"
          URL='https://github.com/jkcoxson/minimuxer/releases/download/build/minimuxer.xcframework.zip'
          curl -fL --retry 4 --retry-all-errors "$URL" -o "$TMP/minimuxer.zip"
          unzip -q "$TMP/minimuxer.zip" -d "$TMP/unpacked"
          FRAMEWORK="$(find "$TMP/unpacked" -name 'minimuxer.xcframework' -type d | head -1)"
          test -n "$FRAMEWORK"
          rm -rf "$OUT/minimuxer.xcframework"
          cp -R "$FRAMEWORK" "$OUT/minimuxer.xcframework"
          command -v xcodegen >/dev/null
          (cd "$ROOT/apps/ios" && xcodegen generate)
          SCRIPT
          chmod +x scripts/bootstrap-native.sh
          ./scripts/bootstrap-native.sh

      - name: Test portable Swift packages
        run: swift test --package-path packages/AtlasCore

      - name: Build full unsigned arm64 device IPA
        run: |
          set -uo pipefail
          xcodebuild \
            -project apps/ios/Atlas.xcodeproj \
            -scheme AtlasApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            DEVELOPMENT_TEAM='' \
            build > /tmp/atlas-xcodebuild.log 2>&1
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            grep -E '(^| )error:|fatal error:|Undefined symbols|ld: ' /tmp/atlas-xcodebuild.log | tail -160 > /tmp/atlas-compiler-errors.txt || true
            cat /tmp/atlas-compiler-errors.txt
            exit "$STATUS"
          fi
          set -e
          APP='build/DerivedData/Build/Products/Release-iphoneos/Atlas.app'
          test -d "$APP"
          rm -rf "$APP/_CodeSignature"
          rm -f "$APP/embedded.mobileprovision"
          mkdir -p build/artifacts/Payload
          cp -R "$APP" build/artifacts/Payload/Atlas.app
          (cd build/artifacts && /usr/bin/zip -qry Atlas-unsigned.ipa Payload)
          shasum -a 256 build/artifacts/Atlas-unsigned.ipa > build/artifacts/Atlas-unsigned.ipa.sha256
          lipo -info "$APP/Atlas" | grep -q arm64
          test ! -e "$APP/_CodeSignature"
          test ! -e "$APP/embedded.mobileprovision"
          unzip -t build/artifacts/Atlas-unsigned.ipa

      - name: Upload Xcode failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-Xcode-failure-log
          path: |
            /tmp/atlas-xcodebuild.log
            /tmp/atlas-compiler-errors.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Upload verified full-app IPA
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-full-unsigned-iOS26-arm64
          path: |
            build/artifacts/Atlas-unsigned.ipa
            build/artifacts/Atlas-unsigned.ipa.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish complete source to main
        run: |
          set -euo pipefail
          rm -rf build apps/ios/Frameworks apps/ios/Atlas.xcodeproj atlas-import-part-* atlas-full-source.b64.* IMPORT.md IMPORT_READY RETRY_NATIVE_BUILD RETRY_COMPILER_ERRORS RETRY_DIAGNOSTIC_ARTIFACT RETRY_SOURCE_FIXES
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish full native Atlas iOS app'
          git push origin HEAD:main